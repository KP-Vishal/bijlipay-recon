version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: bijlipay_recon_db
    environment:
      POSTGRES_USER: bijlipay
      POSTGRES_PASSWORD: bijlipay
      POSTGRES_DB: recon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bijlipay -d recon"]
      interval: 10s
      timeout: 5s
      retries: 5

  recon_api:
    build: .
    container_name: bijlipay_recon_api
    command: uvicorn api.routes:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://bijlipay:bijlipay@postgres:5432/recon
      OUTPUT_DIR: /app/output
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./output:/app/output
      - ./input:/app/input
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
